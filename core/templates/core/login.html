{% extends 'core/base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>💰 FinWise</h1>
        </div>
        
        <div class="auth-header">
            <h2>Welcome Back!</h2>
            <p>Sign in to continue to your financial dashboard</p>
        </div>
        
        <form method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Enter your username" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
            </div>
            
            <div class="forgot-password">
                <a href="{% url 'password_reset' %}">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn-neon">
                Sign In
            </button>
        </form>

        <div class="auth-alt-action">
            <a href="{% url 'home' %}" class="btn btn-secondary">Back to Home</a>
        </div>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'register' %}" class="auth-link">Create one now</a></p>
        </div>
    </div>
</div>
{% endblock %}
