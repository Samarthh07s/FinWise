{% extends 'core/base.html' %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Reset Password</h2>
        <p style="color:#9ca3af;margin-bottom:24px">Enter your email to receive reset instructions</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-neon">Send Reset Link</button>
        </form>
        <div class="auth-footer">
            <a href="{% url 'login' %}" class="auth-link">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
